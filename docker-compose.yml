# ═══════════════════════════════════════════════════════
# Enterprise AI Platform — Docker Compose (v2+)
# Infrastructure + 6 Microservices
# ═══════════════════════════════════════════════════════

services:
  # ──────────── Infrastructure ────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ai_platform}
    ports:
      - "5433:5432" # Host 5433 → Container 5432 (avoid conflict with local pg)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U platform -d ai_platform" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - infra

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - infra

  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - infra

  minio:
    image: minio/minio:RELEASE.2024-02-17T01-15-57Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9000'" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra

  clamav:
    image: clamav/clamav:stable
    platform: linux/amd64 # ClamAV has no ARM64 image; runs via Rosetta on Apple Silicon
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: [ "CMD", "clamdscan", "--version" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - infra

  # ──────────── Microservices ────────────

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - infra

  auth_service:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - infra

  file_service:
    build:
      context: .
      dockerfile: file_service/Dockerfile
    ports:
      - "8002:8002"
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8002/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - infra

  rag_worker:
    build:
      context: .
      dockerfile: rag_worker/Dockerfile
    ports:
      - "8003:8003"
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8003/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - infra

  llm_service:
    build:
      context: .
      dockerfile: llm_service/Dockerfile
    ports:
      - "8004:8004"
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8004/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - infra
      - egress # LLM needs outbound access to OpenAI API

  monitoring_service:
    build:
      context: .
      dockerfile: monitoring_service/Dockerfile
    ports:
      - "8005:8005"
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8005/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - infra

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - frontend

# ──────────── Volumes ────────────
volumes:
  pgdata:
  qdrant_data:
  minio_data:
  clamav_data:

    # ──────────── Networks ────────────
networks:
  frontend:
    driver: bridge # gateway ↔ external clients (inbound)

  infra:
    driver: bridge
    # internal: true # ⚠️ Enable in production — disabled for local dev (blocks port mapping)

  egress:
    driver: bridge # LLM outbound → OpenAI API only
